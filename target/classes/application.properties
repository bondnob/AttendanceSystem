spring.application.name=attendance-sys

spring.datasource.url=jdbc:mysql://localhost:3306/attendance_sys?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.attendance.auth.dto,com.attendance.leave.dto,com.attendance.leave.model

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

attendance.file-storage-path=uploads

attendance.jwt.secret=attendance-system-jwt-secret-key-please-change-32bytes
attendance.jwt.expire-hours=12
